services:
  - type: web
    name: getgrader
    runtime: python
    buildCommand: pip install -r requirements.txt && python apply_patches.py
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --preload
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: EDUPAGE_USERNAME
        sync: false
      - key: EDUPAGE_PASSWORD
        sync: false
